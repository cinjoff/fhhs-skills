<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            zinc: {
              50: '#fafafa', 100: '#f4f4f5', 200: '#e4e4e7', 300: '#d4d4d8',
              400: '#a1a1aa', 500: '#71717a', 600: '#52525b', 700: '#3f3f46',
              800: '#27272a', 900: '#18181b', 950: '#09090b',
            }
          }
        }
      }
    }
  </script>
  <style>
    html { font-size: 14px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    details summary { cursor: pointer; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details summary::before { content: '\25B6'; display: inline-block; margin-right: 8px; font-size: 10px; transition: transform 0.15s; color: #71717a; }
    details[open] summary::before { transform: rotate(90deg); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-50 min-h-screen">

  <div class="max-w-[1400px] mx-auto px-6 py-6">

    <!-- Header -->
    <header class="flex items-center justify-between mb-6">
      <div>
        <h1 id="project-name" class="text-xl font-semibold text-zinc-50">Loading...</h1>
        <p id="milestone-name" class="text-sm text-zinc-400 mt-0.5"></p>
      </div>
      <div class="flex items-center gap-4">
        <div id="stats-bar" class="flex items-center gap-6 text-sm text-zinc-400"></div>
        <div id="connection-status" class="flex items-center gap-2 text-xs text-zinc-400">
          <span id="connection-dot" class="w-2 h-2 rounded-full bg-zinc-600"></span>
          <span id="connection-text">Connecting</span>
        </div>
      </div>
    </header>

    <!-- Main grid -->
    <div class="grid grid-cols-[1fr_320px] gap-6">

      <!-- Left: Milestones -->
      <div id="milestones-container" class="space-y-3">
        <!-- Milestones rendered here -->
      </div>

      <!-- Right: Sidebar -->
      <div class="space-y-4">

        <!-- Currently Working On -->
        <section id="current-work-section" class="hidden">
          <h2 class="text-xs font-medium uppercase tracking-wider text-zinc-400 mb-2">Working On</h2>
          <div id="current-work-card" class="bg-zinc-900 border border-zinc-800 rounded-lg overflow-hidden">
            <div class="p-3 space-y-2">
              <h3 id="current-task-name" class="text-sm font-semibold text-zinc-50"></h3>
              <ul id="current-subtasks" class="space-y-1.5"></ul>
            </div>
            <div class="h-1 bg-zinc-800">
              <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-300" style="width: 0%"></div>
            </div>
          </div>
        </section>

        <!-- Pending Todos -->
        <section id="todos-section" class="hidden">
          <h2 class="text-xs font-medium uppercase tracking-wider text-zinc-400 mb-2">
            Pending Todos <span id="todos-count" class="text-zinc-500"></span>
          </h2>
          <div id="todos-list" class="space-y-1"></div>
        </section>

        <!-- Quick Tasks -->
        <section id="quick-section" class="hidden">
          <h2 class="text-xs font-medium uppercase tracking-wider text-zinc-400 mb-2">Quick Tasks</h2>
          <div id="quick-list" class="space-y-1"></div>
        </section>

        <!-- Recent Updates -->
        <section id="updates-section" class="hidden">
          <h2 class="text-xs font-medium uppercase tracking-wider text-zinc-400 mb-2">Recent Activity</h2>
          <div id="updates-list" class="space-y-2"></div>
        </section>

      </div>
    </div>
  </div>

  <script>
    function relativeTime(dateStr) {
      if (!dateStr) return '';
      var then = new Date(dateStr).getTime();
      if (isNaN(then)) return '';
      var diff = Math.floor((Date.now() - then) / 1000);
      if (diff < 10) return 'just now';
      if (diff < 60) return diff + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      var days = Math.floor(diff / 86400);
      if (days === 1) return 'yesterday';
      if (days < 30) return days + 'd ago';
      return new Date(dateStr).toLocaleDateString();
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function mapStatus(s) {
      if (!s) return 'up next';
      var l = s.toLowerCase();
      if (l === 'complete' || l === 'completed' || l === 'done' || l === 'code_complete' || l === 'code-complete') return 'complete';
      if (l === 'active' || l === 'in_progress') return 'active';
      if (l === 'deferred' || l === 'superseded') return 'deferred';
      return 'up next';
    }

    function checkSvg(cls) {
      return '<svg class="w-3.5 h-3.5 ' + (cls || 'text-green-500') + ' flex-shrink-0" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }

    function circleSvg(cls) {
      return '<svg class="w-3.5 h-3.5 ' + (cls || 'text-zinc-600') + ' flex-shrink-0" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/></svg>';
    }

    function activeSvg() {
      return '<svg class="w-3.5 h-3.5 text-blue-500 flex-shrink-0" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="3" fill="currentColor"/></svg>';
    }

    function miniProgressBar(done, total) {
      var pct = total > 0 ? Math.round((done / total) * 100) : 0;
      var color = pct === 100 ? 'bg-green-500' : 'bg-blue-500';
      return '<div class="flex items-center gap-2 min-w-[100px]">' +
        '<div class="flex-1 h-1.5 bg-zinc-800 rounded-full overflow-hidden">' +
          '<div class="h-full rounded-full ' + color + '" style="width:' + pct + '%"></div>' +
        '</div>' +
        '<span class="text-xs text-zinc-500 tabular-nums">' + done + '/' + total + '</span>' +
      '</div>';
    }

    function setConnected(c) {
      document.getElementById('connection-dot').className = 'w-2 h-2 rounded-full ' + (c ? 'bg-green-500' : 'bg-red-500');
      document.getElementById('connection-text').textContent = c ? 'Live' : 'Offline';
    }

    // Group stages by milestone goal field
    function groupByMilestone(stages) {
      var groups = [];
      var map = {};
      for (var i = 0; i < stages.length; i++) {
        var s = stages[i];
        var key = s.goal || 'Other';
        if (!map[key]) {
          map[key] = { name: key, phases: [] };
          groups.push(map[key]);
        }
        map[key].phases.push(s);
      }
      return groups;
    }

    function render(data) {
      if (!data) return;

      document.getElementById('project-name').textContent = (data.project && data.project.name) || 'Untitled Project';
      document.getElementById('milestone-name').textContent = (data.milestone && data.milestone.name) || '';
      document.title = ((data.project && data.project.name) || 'Project') + ' - Tracker';

      var stages = data.stages || [];

      // Stats bar
      var totalPhases = stages.length;
      var donePhases = stages.filter(function(s) { return mapStatus(s.status) === 'complete'; }).length;
      var activePhases = stages.filter(function(s) { return mapStatus(s.status) === 'active'; }).length;
      var deferredPhases = stages.filter(function(s) { return mapStatus(s.status) === 'deferred'; }).length;
      var todosCount = (data.todos && data.todos.pending) ? data.todos.pending.length : 0;
      document.getElementById('stats-bar').innerHTML =
        '<span class="text-green-500 font-medium">' + donePhases + '</span><span class="text-zinc-500">/</span><span>' + totalPhases + ' phases</span>' +
        (activePhases > 0 ? '<span class="text-blue-400">' + activePhases + ' active</span>' : '') +
        (deferredPhases > 0 ? '<span class="text-yellow-500/70">' + deferredPhases + ' deferred</span>' : '') +
        (todosCount > 0 ? '<span class="text-amber-400">' + todosCount + ' todos</span>' : '');

      // Milestones
      var milestones = groupByMilestone(stages);
      var container = document.getElementById('milestones-container');
      container.innerHTML = milestones.map(function(ms) {
        var total = ms.phases.length;
        var done = ms.phases.filter(function(p) { return mapStatus(p.status) === 'complete'; }).length;
        var allDone = done === total;
        var hasActive = ms.phases.some(function(p) { return mapStatus(p.status) === 'active'; });

        var msIcon = allDone ? checkSvg('text-green-500') : (hasActive ? activeSvg() : circleSvg('text-zinc-500'));
        var msStatusText = allDone ? '<span class="text-green-500 text-xs">Complete</span>'
          : (hasActive ? '<span class="text-blue-400 text-xs">In Progress</span>'
          : '<span class="text-zinc-500 text-xs">Planned</span>');

        var firstNum = ms.phases[0].number;
        var lastNum = ms.phases[ms.phases.length - 1].number;
        var rangeText = firstNum === lastNum ? 'Phase ' + firstNum : 'Phases ' + firstNum + '-' + lastNum;

        var shouldOpen = hasActive || (!allDone && done > 0);

        var phaseRows = ms.phases.map(function(phase) {
          var st = mapStatus(phase.status);
          var icon = st === 'complete' ? checkSvg() : (st === 'active' ? activeSvg() : (st === 'deferred' ? circleSvg('text-yellow-500/50') : circleSvg()));
          var textCls = st === 'complete' ? 'text-zinc-500' : (st === 'deferred' ? 'text-zinc-600' : 'text-zinc-200');
          var badge = '';
          if (st === 'active') badge = '<span class="px-1.5 py-0.5 rounded text-[11px] bg-blue-500/15 text-blue-400">Active</span>';
          else if (st === 'deferred') badge = '<span class="px-1.5 py-0.5 rounded text-[11px] bg-yellow-500/10 text-yellow-500/60">Deferred</span>';

          var taskDetail = '';
          if (phase.tasks && phase.tasks.length > 0) {
            var tasksDone = phase.tasks.filter(function(t) { return mapStatus(t.status) === 'complete'; }).length;
            taskDetail = '<span class="text-xs text-zinc-600 ml-1">' + tasksDone + '/' + phase.tasks.length + ' plans</span>';
          }

          return '<div class="flex items-center gap-2 py-1 px-2 rounded hover:bg-zinc-800/50">' +
            icon +
            '<span class="text-zinc-500 text-xs tabular-nums w-6">' + phase.number + '</span>' +
            '<span class="text-sm ' + textCls + ' flex-1 truncate">' + escapeHtml(phase.name) + '</span>' +
            taskDetail +
            badge +
          '</div>';
        }).join('');

        return '<details class="bg-zinc-900/60 border border-zinc-800/80 rounded-lg overflow-hidden"' + (shouldOpen ? ' open' : '') + '>' +
          '<summary class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-800/30 select-none">' +
            '<div class="flex items-center gap-2 flex-1 min-w-0">' +
              msIcon +
              '<span class="font-semibold text-sm text-zinc-100">' + escapeHtml(ms.name) + '</span>' +
              '<span class="text-xs text-zinc-500">' + rangeText + '</span>' +
              msStatusText +
            '</div>' +
            miniProgressBar(done, total) +
          '</summary>' +
          '<div class="px-2 pb-2 pt-1">' +
            phaseRows +
          '</div>' +
        '</details>';
      }).join('');

      // Current work
      var currentSection = document.getElementById('current-work-section');
      var activeTask = null;
      for (var i = 0; i < stages.length; i++) {
        if (mapStatus(stages[i].status) === 'active' && stages[i].tasks) {
          for (var j = 0; j < stages[i].tasks.length; j++) {
            if (mapStatus(stages[i].tasks[j].status) === 'active') {
              activeTask = stages[i].tasks[j];
              break;
            }
          }
          if (activeTask) break;
        }
      }

      if (activeTask && activeTask.subtasks && activeTask.subtasks.length > 0) {
        currentSection.classList.remove('hidden');
        document.getElementById('current-task-name').textContent = activeTask.name || 'Current Task';
        var doneCount = 0;
        document.getElementById('current-subtasks').innerHTML = activeTask.subtasks.map(function(st) {
          var isDone = st.status === 'done' || st.status === 'complete';
          var isAct = st.status === 'in_progress' || st.status === 'active';
          if (isDone) doneCount++;
          return '<li class="flex items-center gap-2">' +
            (isDone ? checkSvg() : (isAct ? activeSvg() : circleSvg())) +
            '<span class="text-xs ' + (isDone ? 'text-zinc-500 line-through' : 'text-zinc-300') + '">' + escapeHtml(st.name) + '</span>' +
          '</li>';
        }).join('');
        var pct = activeTask.subtasks.length > 0 ? Math.round((doneCount / activeTask.subtasks.length) * 100) : 0;
        document.getElementById('progress-bar').style.width = pct + '%';
      } else {
        currentSection.classList.add('hidden');
      }

      // Todos
      var todosSection = document.getElementById('todos-section');
      var todos = (data.todos && data.todos.pending) || [];
      if (todos.length > 0) {
        todosSection.classList.remove('hidden');
        document.getElementById('todos-count').textContent = '(' + todos.length + ')';
        document.getElementById('todos-list').innerHTML = todos.map(function(t) {
          var area = t.area ? '<span class="text-[11px] text-zinc-500 bg-zinc-800 px-1.5 py-0.5 rounded">' + escapeHtml(t.area) + '</span>' : '';
          return '<div class="flex items-center gap-2 py-1.5 px-2 rounded bg-zinc-900/50 border-l-2 border-l-amber-500/40">' +
            circleSvg('text-amber-500/50') +
            '<span class="text-xs text-zinc-300 flex-1 truncate">' + escapeHtml(t.title) + '</span>' +
            area +
          '</div>';
        }).join('');
      } else {
        todosSection.classList.add('hidden');
      }

      // Quick Tasks
      var quickSection = document.getElementById('quick-section');
      var qts = data.quickTasks || [];
      if (qts.length > 0) {
        quickSection.classList.remove('hidden');
        document.getElementById('quick-list').innerHTML = qts.map(function(q) {
          var done = q.status === 'complete';
          return '<div class="flex items-center gap-2 py-1.5 px-2 rounded bg-zinc-900/50 border-l-2 ' + (done ? 'border-l-green-500/50' : 'border-l-zinc-700') + '">' +
            (done ? checkSvg() : circleSvg()) +
            '<span class="text-xs ' + (done ? 'text-zinc-500' : 'text-zinc-300') + ' flex-1 truncate">' +
              '<span class="text-zinc-600 mr-1">#' + q.number + '</span>' +
              escapeHtml(q.title) +
            '</span>' +
          '</div>';
        }).join('');
      } else {
        quickSection.classList.add('hidden');
      }

      // Recent Activity
      var updatesSection = document.getElementById('updates-section');
      var updates = data.recentActivity || [];
      if (updates.length > 0) {
        updatesSection.classList.remove('hidden');
        document.getElementById('updates-list').innerHTML = updates.slice(0, 6).map(function(u) {
          return '<div class="flex items-start gap-2">' +
            '<span class="text-[11px] text-zinc-600 whitespace-nowrap min-w-[56px] pt-px tabular-nums">' + escapeHtml(relativeTime(u.time)) + '</span>' +
            '<span class="text-xs text-zinc-400">' + escapeHtml(u.text) + '</span>' +
          '</div>';
        }).join('');
      } else {
        updatesSection.classList.add('hidden');
      }
    }

    function fetchState() {
      fetch('/api/state').then(function(r) { return r.json(); }).then(render).catch(function(e) { console.error(e); });
    }

    var es = null, rt = null;
    function connectSSE() {
      if (es) { es.close(); es = null; }
      es = new EventSource('/api/events');
      es.onopen = function() { setConnected(true); if (rt) { clearTimeout(rt); rt = null; } };
      es.addEventListener('refresh', fetchState);
      es.onerror = function() { setConnected(false); es.close(); es = null; if (!rt) rt = setTimeout(function() { rt = null; connectSSE(); }, 2000); };
    }

    document.addEventListener('DOMContentLoaded', function() { fetchState(); connectSSE(); });
  </script>
</body>
</html>
