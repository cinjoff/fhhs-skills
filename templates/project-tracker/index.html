<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            zinc: {
              50: '#fafafa',
              100: '#f4f4f5',
              200: '#e4e4e7',
              300: '#d4d4d8',
              400: '#a1a1aa',
              500: '#71717a',
              600: '#52525b',
              700: '#3f3f46',
              800: '#27272a',
              900: '#18181b',
              950: '#09090b',
            }
          }
        }
      }
    }
  </script>
  <style>
    html {
      font-size: 14px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
    }
    /* Hide scrollbar but keep scrolling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-50 min-h-screen">

  <div class="max-w-2xl mx-auto px-6 py-8 space-y-8">

    <!-- Header -->
    <header class="space-y-1">
      <div class="flex items-center justify-between">
        <h1 id="project-name" class="text-lg font-semibold text-zinc-50">Loading...</h1>
        <div id="connection-status" class="flex items-center gap-2 text-xs text-zinc-400">
          <span id="connection-dot" class="w-2 h-2 rounded-full bg-zinc-600"></span>
          <span id="connection-text">Connecting</span>
        </div>
      </div>
      <p id="milestone-name" class="text-sm text-zinc-400"></p>
    </header>

    <!-- Stage Overview -->
    <section>
      <h2 class="text-xs font-medium uppercase tracking-wider text-zinc-400 mb-3">Stages</h2>
      <div id="stages-list" class="space-y-1">
        <!-- Stages rendered here -->
      </div>
    </section>

    <!-- Currently Working On -->
    <section id="current-work-section" class="hidden">
      <h2 class="text-xs font-medium uppercase tracking-wider text-zinc-400 mb-3">Currently Working On</h2>
      <div id="current-work-card" class="bg-zinc-900 border border-zinc-800 rounded-lg overflow-hidden">
        <div class="p-4 space-y-3">
          <h3 id="current-task-name" class="text-sm font-semibold text-zinc-50"></h3>
          <ul id="current-subtasks" class="space-y-2">
            <!-- Subtasks rendered here -->
          </ul>
        </div>
        <div class="h-1 bg-zinc-800">
          <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>
    </section>

    <!-- Recent Updates -->
    <section id="updates-section" class="hidden">
      <h2 class="text-xs font-medium uppercase tracking-wider text-zinc-400 mb-3">Recent Updates</h2>
      <div id="updates-list" class="space-y-3">
        <!-- Updates rendered here -->
      </div>
    </section>

  </div>

  <script>
    // ──────────────────────────────────────────────
    // Relative time formatting
    // ──────────────────────────────────────────────
    function relativeTime(dateStr) {
      if (!dateStr) return '';
      const now = Date.now();
      const then = new Date(dateStr).getTime();
      if (isNaN(then)) return '';

      const diffMs = now - then;
      const seconds = Math.floor(diffMs / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);

      if (seconds < 10) return 'just now';
      if (seconds < 60) return seconds + 's ago';
      if (minutes < 60) return minutes + ' min ago';
      if (hours < 24) return hours + 'h ago';
      if (days === 1) return 'Yesterday';
      if (days < 7) return days + 'd ago';
      return new Date(dateStr).toLocaleDateString();
    }

    // ──────────────────────────────────────────────
    // Status helpers
    // ──────────────────────────────────────────────
    function mapStatus(status) {
      if (!status) return 'Planned';
      const s = status.toLowerCase();
      if (s === 'completed' || s === 'complete' || s === 'done') return 'Complete';
      if (s === 'in_progress' || s === 'active') return 'Active';
      return 'Up Next';
    }

    function statusBorderClass(status) {
      const mapped = mapStatus(status);
      if (mapped === 'Active') return 'border-l-blue-500';
      if (mapped === 'Complete') return 'border-l-green-500';
      return 'border-l-zinc-700';
    }

    function statusBadge(status) {
      const mapped = mapStatus(status);
      if (mapped === 'Complete') {
        return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-500/15 text-green-500">Complete</span>';
      }
      if (mapped === 'Active') {
        return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-500/15 text-blue-500">Active</span>';
      }
      return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-zinc-700/50 text-zinc-400">Up Next</span>';
    }

    // ──────────────────────────────────────────────
    // Subtask icons (SVG)
    // ──────────────────────────────────────────────
    function checkIcon() {
      return '<svg class="w-4 h-4 text-green-500 flex-shrink-0" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }

    function circleIcon() {
      return '<svg class="w-4 h-4 text-zinc-600 flex-shrink-0" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/></svg>';
    }

    function activeCircleIcon() {
      return '<svg class="w-4 h-4 text-blue-500 flex-shrink-0" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="3" fill="currentColor"/></svg>';
    }

    // ──────────────────────────────────────────────
    // Connection indicator
    // ──────────────────────────────────────────────
    function setConnected(connected) {
      const dot = document.getElementById('connection-dot');
      const text = document.getElementById('connection-text');
      if (connected) {
        dot.className = 'w-2 h-2 rounded-full bg-green-500';
        text.textContent = 'Connected';
      } else {
        dot.className = 'w-2 h-2 rounded-full bg-red-500';
        text.textContent = 'Disconnected';
      }
    }

    // ──────────────────────────────────────────────
    // Render
    // ──────────────────────────────────────────────
    function render(data) {
      if (!data) return;

      // Header
      const projectName = document.getElementById('project-name');
      const milestoneName = document.getElementById('milestone-name');
      projectName.textContent = (data.project && data.project.name) || 'Untitled Project';
      milestoneName.textContent = (data.milestone && data.milestone.name) || '';
      document.title = (data.project && data.project.name) ? data.project.name + ' - Tracker' : 'Project Tracker';

      // Stages
      const stagesList = document.getElementById('stages-list');
      const stages = data.stages || [];
      if (stages.length === 0) {
        stagesList.innerHTML = '<p class="text-sm text-zinc-500 italic">No stages defined yet.</p>';
      } else {
        stagesList.innerHTML = stages.map(function(stage) {
          const borderClass = statusBorderClass(stage.status);
          const badge = statusBadge(stage.status);
          const goal = stage.goal ? '<p class="text-sm text-zinc-400 truncate mt-0.5">' + escapeHtml(stage.goal) + '</p>' : '';
          return '<div class="border-l-2 ' + borderClass + ' pl-3 py-2 rounded-r bg-zinc-900/50">' +
            '<div class="flex items-center justify-between gap-3">' +
              '<span class="text-sm text-zinc-50">' +
                '<span class="text-zinc-500 mr-1.5">' + escapeHtml(String(stage.number)) + '.</span>' +
                escapeHtml(stage.name) +
              '</span>' +
              badge +
            '</div>' +
            goal +
          '</div>';
        }).join('');
      }

      // Currently Working On
      var activeStage = null;
      var activeTask = null;
      for (var i = 0; i < stages.length; i++) {
        var s = stages[i];
        if (mapStatus(s.status) === 'Active' && s.tasks) {
          activeStage = s;
          for (var j = 0; j < s.tasks.length; j++) {
            if (mapStatus(s.tasks[j].status) === 'Active') {
              activeTask = s.tasks[j];
              break;
            }
          }
          break;
        }
      }

      var currentSection = document.getElementById('current-work-section');
      if (activeTask && activeTask.subtasks && activeTask.subtasks.length > 0) {
        currentSection.classList.remove('hidden');
        document.getElementById('current-task-name').textContent = activeTask.name || 'Current Task';

        var subtasksList = document.getElementById('current-subtasks');
        var doneCount = 0;
        subtasksList.innerHTML = activeTask.subtasks.map(function(st) {
          var isDone = st.status === 'done' || st.status === 'completed' || st.status === 'complete';
          var isActive = st.status === 'in_progress' || st.status === 'active';
          if (isDone) doneCount++;
          var icon = isDone ? checkIcon() : (isActive ? activeCircleIcon() : circleIcon());
          var textClass = isDone ? 'text-zinc-500 line-through' : 'text-zinc-300';
          return '<li class="flex items-start gap-2">' +
            icon +
            '<span class="text-sm ' + textClass + '">' + escapeHtml(st.name) + '</span>' +
          '</li>';
        }).join('');

        var total = activeTask.subtasks.length;
        var pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
        document.getElementById('progress-bar').style.width = pct + '%';
      } else if (activeTask) {
        currentSection.classList.remove('hidden');
        document.getElementById('current-task-name').textContent = activeTask.name || 'Current Task';
        document.getElementById('current-subtasks').innerHTML =
          '<li class="text-sm text-zinc-400 italic">No subtasks defined.</li>';
        document.getElementById('progress-bar').style.width = '0%';
      } else {
        currentSection.classList.add('hidden');
      }

      // Recent Updates
      var updatesSection = document.getElementById('updates-section');
      var updates = data.recentActivity || [];
      if (updates.length > 0) {
        updatesSection.classList.remove('hidden');
        var updatesList = document.getElementById('updates-list');
        updatesList.innerHTML = updates.map(function(u) {
          return '<div class="flex items-start gap-3">' +
            '<span class="text-xs text-zinc-500 whitespace-nowrap min-w-[70px] pt-0.5">' + escapeHtml(relativeTime(u.time)) + '</span>' +
            '<span class="text-sm text-zinc-300">' + escapeHtml(u.text) + '</span>' +
          '</div>';
        }).join('');
      } else {
        updatesSection.classList.add('hidden');
      }
    }

    // ──────────────────────────────────────────────
    // Utilities
    // ──────────────────────────────────────────────
    function escapeHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ──────────────────────────────────────────────
    // Data fetching
    // ──────────────────────────────────────────────
    function fetchState() {
      fetch('/api/state')
        .then(function(res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function(data) {
          render(data);
        })
        .catch(function(err) {
          console.error('Failed to fetch state:', err);
        });
    }

    // ──────────────────────────────────────────────
    // SSE connection
    // ──────────────────────────────────────────────
    var eventSource = null;
    var reconnectTimer = null;

    function connectSSE() {
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }

      eventSource = new EventSource('/api/events');

      eventSource.onopen = function() {
        setConnected(true);
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
      };

      eventSource.addEventListener('refresh', function() {
        fetchState();
      });

      eventSource.onerror = function() {
        setConnected(false);
        eventSource.close();
        eventSource = null;

        // Auto-reconnect after 2 seconds
        if (!reconnectTimer) {
          reconnectTimer = setTimeout(function() {
            reconnectTimer = null;
            connectSSE();
          }, 2000);
        }
      };
    }

    // ──────────────────────────────────────────────
    // Initialize on page load
    // ──────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      fetchState();
      connectSSE();
    });
  </script>

</body>
</html>
