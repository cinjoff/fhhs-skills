<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='14' font-family='monospace' fill='%2300ff41'>></text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0a;--surface:#131313;--border:#222;--dim:#3a3a3a;
      --muted:#808080;--subtle:#a0a0a0;--text:#ccc;--bright:#e8e8e8;
      --fire:#ff2d00;--orange:#ff6b00;--green:#00ff41;--amber:#ffb300;
    }
    html{font-size:15px}
    body{font-family:'JetBrains Mono','Courier New',monospace;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
    body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(transparent 0px,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--dim)}

    .wrap{max-width:1100px;margin:0 auto;padding:1.5rem}

    /* Header */
    .hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:0.75rem}
    .hdr-l{display:flex;align-items:baseline;min-width:0;flex:1;gap:1.5ch}
    .proj{font-size:1.1rem;font-weight:700;color:var(--bright);white-space:nowrap}
    .proj .gt{color:var(--green);margin-right:0.75ch;font-weight:400}
    .ms-lbl{color:var(--muted);font-size:0.85rem}
    .last-act{color:var(--dim);font-size:0.75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40ch}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0}
    .dot.on{background:var(--green);box-shadow:0 0 6px rgba(0,255,65,0.5);animation:pulse 2s ease-in-out infinite}
    .dot.off{background:var(--fire)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

    /* Stats strip */
    .stats{display:flex;align-items:center;gap:1.5ch;padding-bottom:1.25rem;margin-bottom:1.25rem;border-bottom:1px solid var(--border)}
    .s-ct{font-size:0.85rem;color:var(--subtle);white-space:nowrap}
    .s-ct .n{color:var(--green);font-weight:700}
    .s-ct .t{color:var(--text)}
    .s-bar{flex:1;height:2px;background:var(--dim);overflow:hidden}
    .s-fill{height:100%;background:var(--green);transition:width 0.5s ease-out;box-shadow:0 0 8px rgba(0,255,65,0.25)}
    .s-tags{display:flex;gap:1.5ch;font-size:0.85rem;color:var(--muted)}
    .s-tags .v{font-weight:700}
    .s-tags .active .v{color:var(--fire)}
    .s-tags .defer .v{color:var(--amber)}
    .s-tags .todo .v{color:var(--amber)}

    /* Grid */
    .grid{display:grid;grid-template-columns:1fr 260px;gap:2rem}
    @media(max-width:800px){.grid{grid-template-columns:1fr}}

    /* Milestones */
    .ms-list{display:flex;flex-direction:column;gap:1px}
    details.mg{background:var(--surface);border:1px solid var(--border);animation:fadeUp 0.2s ease-out both}
    details.mg.is-active{border-color:rgba(255,45,0,0.3)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    details.mg:nth-child(2){animation-delay:.04s}details.mg:nth-child(3){animation-delay:.08s}
    details.mg:nth-child(4){animation-delay:.12s}details.mg:nth-child(5){animation-delay:.16s}
    details.mg:nth-child(6){animation-delay:.2s}details.mg:nth-child(7){animation-delay:.24s}

    details.mg summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:1ch;padding:0.5rem 0.75rem;user-select:none}
    details.mg summary::-webkit-details-marker{display:none}
    .mg-arr{color:var(--muted);font-size:0.7rem;width:1.2ch;text-align:center;display:inline-block;transition:transform .15s ease-out}
    details.mg[open] .mg-arr{transform:rotate(90deg)}
    .mg-ico{width:1.5ch;text-align:center;font-size:0.8rem;flex-shrink:0}
    .mg-ico.c{color:var(--green)}.mg-ico.a{color:var(--fire)}.mg-ico.p{color:var(--dim)}
    .mg-nm{font-weight:700;font-size:0.9rem;color:var(--bright);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .mg-rng{font-size:0.75rem;color:var(--muted);margin-right:0.5ch}
    .mg-bar{width:48px;height:2px;background:var(--dim);overflow:hidden;flex-shrink:0}
    .mg-bf{height:100%;background:var(--green);transition:width .3s ease-out}
    .mg-bf.partial{background:var(--fire)}
    .mg-ct{font-size:0.75rem;color:var(--muted);font-variant-numeric:tabular-nums;flex-shrink:0}

    .mg-body{padding:0 0.75rem 0.5rem;animation:cFade .15s ease-out}
    @keyframes cFade{from{opacity:0}to{opacity:1}}

    /* Phase rows */
    .ph{display:flex;align-items:center;gap:1ch;padding:0.2rem 0;font-size:0.85rem}
    .ph-i{width:1.5ch;text-align:center;flex-shrink:0;font-size:0.8rem}
    .ph-i.c{color:var(--green)}.ph-i.a{color:var(--fire)}.ph-i.d{color:var(--amber);opacity:.5}.ph-i.n{color:var(--dim)}
    .ph-n{font-variant-numeric:tabular-nums;color:var(--dim);width:2.5ch;text-align:right;flex-shrink:0}
    .ph-t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ph-t.c{color:var(--muted)}.ph-t.a{color:var(--bright)}.ph-t.d{color:var(--dim)}.ph-t.n{color:var(--subtle)}
    .ph-b{font-size:0.7rem;flex-shrink:0}
    .ph-b.a{color:var(--fire)}.ph-b.d{color:var(--amber);opacity:.6}
    .ph-p{font-size:0.7rem;color:var(--dim);font-variant-numeric:tabular-nums;flex-shrink:0}
    .ph-tbd{font-size:0.65rem;color:var(--dim);font-style:italic;flex-shrink:0}
    .blink{animation:bl 1s step-end infinite}
    @keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

    /* Expandable phase details */
    details.ph-exp{margin:0}
    details.ph-exp summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:1ch;padding:0.2rem 0;font-size:0.85rem}
    details.ph-exp summary::-webkit-details-marker{display:none}
    .ph-exp-arr{color:var(--muted);font-size:0.6rem;width:1ch;text-align:center;display:inline-block;transition:transform .15s ease-out;flex-shrink:0}
    details.ph-exp[open] .ph-exp-arr{transform:rotate(90deg)}
    .ph-plans{padding:0.15rem 0 0.25rem 3.5ch}
    .ph-plan{display:flex;align-items:baseline;gap:0.75ch;padding:0.1rem 0;font-size:0.8rem}
    .ph-plan-i{width:1.2ch;text-align:center;flex-shrink:0;font-size:0.75rem}
    .ph-plan-i.c{color:var(--green)}.ph-plan-i.a{color:var(--fire)}.ph-plan-i.n{color:var(--dim)}
    .ph-plan-nm{color:var(--text)}
    .ph-plan-obj{font-size:0.7rem;color:var(--muted);margin-left:0.5ch;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* Sidebar */
    .side{display:flex;flex-direction:column;gap:1.25rem}
    .sh{font-size:0.8rem;color:var(--dim);margin-bottom:0.35rem}
    .sh .c{color:var(--muted)}
    .empty{font-size:0.8rem;color:var(--dim);padding:0.15rem 0;font-style:italic}
    .empty .cmd{font-style:normal;color:var(--subtle)}

    /* Working On */
    .wc{border:1px solid rgba(255,45,0,0.35);background:var(--surface);padding:0.65rem}
    .wc-nm{font-weight:700;font-size:0.85rem;color:var(--bright);margin-bottom:0.4rem}
    .wc-st{display:flex;align-items:center;gap:1ch;font-size:0.8rem;padding:0.12rem 0}
    .wc-si{width:1.5ch;text-align:center;flex-shrink:0;font-size:0.75rem}
    .wc-si.done{color:var(--green)}.wc-si.act{color:var(--fire)}.wc-si.pen{color:var(--dim)}
    .wc-sn{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .wc-sn.done{color:var(--muted);text-decoration:line-through}.wc-sn.act{color:var(--bright)}.wc-sn.pen{color:var(--subtle)}
    .wc-bar{height:2px;background:var(--dim);margin-top:0.6rem;overflow:hidden}
    .wc-bf{height:100%;background:var(--fire);transition:width .3s ease-out}

    /* Backlog */
    .td{display:flex;align-items:center;gap:1ch;font-size:0.8rem;padding:0.2rem 0}
    .td-i{color:var(--amber);width:1.5ch;text-align:center;flex-shrink:0;font-size:0.75rem}
    .td-t{color:var(--subtle);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
    .td-a{font-size:0.7rem;color:var(--dim);flex-shrink:0}
    .td-body{font-size:0.75rem;color:var(--dim);padding:0.15rem 0 0.3rem 2.5ch;white-space:pre-wrap;line-height:1.4}

    /* Quick tasks */
    .qt{display:flex;align-items:center;gap:1ch;font-size:0.8rem;padding:0.2rem 0}
    .qt-i{width:1.5ch;text-align:center;flex-shrink:0;font-size:0.75rem}
    .qt-i.done{color:var(--green)}.qt-i.pen{color:var(--dim)}
    .qt-num{color:var(--dim)}
    .qt-t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
    .qt-t.done{color:var(--muted)}.qt-t.pen{color:var(--subtle)}
    .qt-body{font-size:0.75rem;color:var(--dim);padding:0.15rem 0 0.3rem 2.5ch;white-space:pre-wrap;line-height:1.4}

    /* Activity */
    .ac{display:flex;gap:1.5ch;font-size:0.8rem;padding:0.12rem 0}
    .ac-t{color:var(--dim);font-variant-numeric:tabular-nums;white-space:nowrap;min-width:5.5ch}
    .ac-x{color:var(--subtle)}

    /* Concerns */
    .cn-row{display:flex;align-items:center;gap:1ch;font-size:0.8rem;padding:0.15rem 0}
    .cn-nm{color:var(--subtle);flex:1}
    .cn-ct{color:var(--amber);font-size:0.75rem;font-variant-numeric:tabular-nums}

    /* Codebase freshness */
    .cf{font-size:0.8rem;color:var(--subtle);padding:0.15rem 0}
    .cf-stale{color:var(--amber)}

    /* Action buttons */
    .btn-action{display:inline-block;font-family:inherit;font-size:0.65rem;color:var(--muted);border:1px solid var(--dim);background:transparent;padding:0.1rem 0.5rem;border-radius:3px;cursor:pointer;margin-left:0.5ch;transition:color .15s,border-color .15s;white-space:nowrap;flex-shrink:0}
    .btn-action:hover{color:var(--green);border-color:var(--green)}

    /* Toast */
    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--green);color:var(--green);font-family:inherit;font-size:0.8rem;padding:0.4rem 1.2rem;border-radius:3px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:10000}
    .toast.show{opacity:1}
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { h, render as preactRender } from 'https://esm.sh/preact@10.25.4';
    import { useState, useEffect, useRef, useCallback } from 'https://esm.sh/preact@10.25.4/hooks';
    import htm from 'https://esm.sh/htm@3.1.1';

    const html = htm.bind(h);

    // -----------------------------------------------------------------------
    // Utilities
    // -----------------------------------------------------------------------
    function relativeTime(dateStr) {
      if (!dateStr) return '';
      const then = new Date(dateStr).getTime();
      if (isNaN(then)) return '';
      const diff = Math.floor((Date.now() - then) / 1000);
      if (diff < 10) return 'now';
      if (diff < 60) return diff + 's';
      if (diff < 3600) return Math.floor(diff / 60) + 'm';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h';
      const days = Math.floor(diff / 86400);
      if (days === 1) return '1d';
      if (days < 30) return days + 'd';
      return new Date(dateStr).toLocaleDateString();
    }

    function daysBetween(dateStr) {
      if (!dateStr) return Infinity;
      const then = new Date(dateStr).getTime();
      if (isNaN(then)) return Infinity;
      return Math.floor((Date.now() - then) / 86400000);
    }

    function mapStatus(s) {
      if (!s) return 'n';
      const l = s.toLowerCase();
      if (l === 'complete' || l === 'completed' || l === 'done' || l === 'code_complete' || l === 'code-complete') return 'c';
      if (l === 'active' || l === 'in_progress') return 'a';
      if (l === 'deferred' || l === 'superseded') return 'd';
      return 'n';
    }

    function groupByMilestone(stages) {
      const groups = [];
      const map = {};
      for (const s of stages) {
        const key = s.milestoneName || s.goal || 'Phases';
        if (!map[key]) {
          map[key] = { name: key, phases: [] };
          groups.push(map[key]);
        }
        map[key].phases.push(s);
      }
      return groups;
    }

    // -----------------------------------------------------------------------
    // Toast
    // -----------------------------------------------------------------------
    function useToast() {
      const [toast, setToast] = useState('');
      const timerRef = useRef(null);

      const show = useCallback((msg) => {
        setToast(msg);
        if (timerRef.current) clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => setToast(''), 1200);
      }, []);

      // Clean up timer on unmount
      useEffect(() => () => {
        if (timerRef.current) clearTimeout(timerRef.current);
      }, []);

      return [toast, show];
    }

    function copyToClipboard(text, showToast) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied!');
      }).catch(() => {
        showToast('Copy failed');
      });
    }

    // -----------------------------------------------------------------------
    // Components
    // -----------------------------------------------------------------------
    function Header({ data, connected }) {
      const project = data.project || {};
      const milestone = data.milestone || {};
      const lastAct = data.lastActivity
        || data.state?.lastActivity
        || (data.recentActivity && data.recentActivity.length > 0
          ? { date: data.recentActivity[0].time, description: data.recentActivity[0].text }
          : null);

      let lastActText = '';
      if (lastAct && lastAct.date) {
        const ago = relativeTime(lastAct.date);
        const agoStr = ago === 'now' ? 'just now' : `${ago} ago`;
        lastActText = `Last: ${agoStr}` + (lastAct.description ? ` \u2014 ${lastAct.description}` : '');
      }

      return html`
        <header class="hdr">
          <div class="hdr-l">
            <h1 class="proj"><span class="gt">></span>${project.name || '...'}</h1>
            ${milestone.name ? html`<span class="ms-lbl">${milestone.name}</span>` : null}
            ${lastActText ? html`<span class="last-act">${lastActText}</span>` : null}
          </div>
          <span class=${`dot ${connected ? 'on' : 'off'}`}></span>
        </header>
      `;
    }

    function Stats({ data }) {
      const stages = data.stages || [];
      const total = stages.length;
      const done = stages.filter(s => mapStatus(s.status) === 'c').length;
      const active = stages.filter(s => mapStatus(s.status) === 'a').length;
      const deferred = stages.filter(s => mapStatus(s.status) === 'd').length;
      const todosN = (data.todos?.pending?.length) || (data.backlog?.length) || 0;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;

      // Tag pills from data.tags or computed
      const tags = data.tags || {};

      return html`
        <div class="stats">
          <span class="s-ct"><span class="n">${done}</span><span class="t">/${total}</span></span>
          <div class="s-bar"><div class="s-fill" style=${{ width: pct + '%' }}></div></div>
          <div class="s-tags">
            ${active > 0 ? html`<span class="active"><span class="v">${active}</span> active</span>` : null}
            ${deferred > 0 ? html`<span class="defer"><span class="v">${deferred}</span> deferred</span>` : null}
            ${todosN > 0 ? html`<span class="todo"><span class="v">${todosN}</span> backlog</span>` : null}
            ${tags.planned ? html`<span><span class="v">${tags.planned}</span> planned</span>` : null}
          </div>
        </div>
      `;
    }

    function PlanList({ tasks }) {
      return html`
        <div class="ph-plans">
          ${tasks.map((tk, i) => {
            const tst = mapStatus(tk.status);
            const tic = tst === 'c' ? '\u2713' : (tst === 'a' ? '\u25B6' : '\u00B7');
            return html`
              <div class="ph-plan" key=${tk.name || i}>
                <span class=${`ph-plan-i ${tst}`}>${tic}</span>
                <span class="ph-plan-nm">${tk.name}</span>
                ${tk.objective ? html`<span class="ph-plan-obj">${tk.objective}</span>` : null}
              </div>
            `;
          })}
        </div>
      `;
    }

    function PhaseRow({ ph, showToast }) {
      const st = mapStatus(ph.status);
      const ic = st === 'c' ? '\u2713' : (st === 'a' ? '\u25B6' : (st === 'd' ? '~' : '\u00B7'));
      const hasTasks = ph.tasks && ph.tasks.length > 0;
      const shouldOpen = st === 'a';

      if (hasTasks) {
        const pd = ph.tasks.filter(t => mapStatus(t.status) === 'c').length;
        return html`
          <details class="ph-exp" open=${shouldOpen || undefined}>
            <summary>
              <span class="ph-exp-arr">\u25B8</span>
              <span class=${`ph-i ${st}`}>${ic}</span>
              <span class="ph-n">${ph.number}</span>
              <span class=${`ph-t ${st}`}>${ph.name}</span>
              <span class="ph-p">${pd}/${ph.tasks.length}</span>
              ${st === 'a' ? html`<span class="ph-b a">active</span>` : null}
              ${st === 'd' ? html`<span class="ph-b d">deferred</span>` : null}
            </summary>
            <${PlanList} tasks=${ph.tasks} />
          </details>
        `;
      }

      // No tasks — show tbd + action buttons
      return html`
        <div class="ph">
          <span class=${`ph-i ${st}`}>${ic}</span>
          <span class="ph-n">${ph.number}</span>
          <span class=${`ph-t ${st}`}>${ph.name}</span>
          ${st !== 'c' && st !== 'd' ? html`
            <span class="ph-tbd">tbd</span>
            <button class="btn-action" aria-label=${"Plan phase " + ph.number} onClick=${() => copyToClipboard(`/plan-work phase ${ph.number}: ${ph.name}`, showToast)}>[plan]</button>
            <button class="btn-action" aria-label=${"Build phase " + ph.number} onClick=${() => copyToClipboard(`/build phase ${ph.number}: ${ph.name}`, showToast)}>[build]</button>
          ` : null}
          ${st === 'a' ? html`<span class="ph-b a">active</span>` : null}
          ${st === 'd' ? html`<span class="ph-b d">deferred</span>` : null}
        </div>
      `;
    }

    function MilestoneGroup({ ms, showToast }) {
      const t = ms.phases.length;
      const d = ms.phases.filter(p => mapStatus(p.status) === 'c').length;
      const allDone = d === t;
      const hasAct = ms.phases.some(p => mapStatus(p.status) === 'a');
      const ico = allDone ? '\u2713' : (hasAct ? '\u25B6' : '\u00B7');
      const icoCls = allDone ? 'c' : (hasAct ? 'a' : 'p');

      const firstN = ms.phases[0].number;
      const lastN = ms.phases[ms.phases.length - 1].number;
      const rng = firstN === lastN ? String(firstN) : `${firstN}\u2013${lastN}`;
      const shouldOpen = hasAct || (!allDone && d > 0);
      const barPct = t > 0 ? Math.round(d / t * 100) : 0;

      return html`
        <details class=${`mg${hasAct ? ' is-active' : ''}`} open=${shouldOpen || undefined}>
          <summary>
            <span class="mg-arr">\u25B8</span>
            <span class=${`mg-ico ${icoCls}`}>${ico}</span>
            <span class="mg-nm">${ms.name}</span>
            <span class="mg-rng">${rng}</span>
            <div class="mg-bar"><div class=${`mg-bf${allDone ? '' : ' partial'}`} style=${{ width: barPct + '%' }}></div></div>
            <span class="mg-ct">${d}/${t}</span>
          </summary>
          <div class="mg-body">
            ${ms.phases.map(ph => html`<${PhaseRow} ph=${ph} showToast=${showToast} key=${ph.number} />`)}
          </div>
        </details>
      `;
    }

    function WorkingOn({ data }) {
      const stages = data.stages || [];
      let activeTask = null;
      for (const stage of stages) {
        if (mapStatus(stage.status) === 'a' && stage.tasks) {
          for (const task of stage.tasks) {
            if (mapStatus(task.status) === 'a') {
              activeTask = task;
              break;
            }
          }
          if (activeTask) break;
        }
      }

      // Also check data.workingOn
      if (!activeTask && data.workingOn?.task) {
        activeTask = {
          name: data.workingOn.task,
          subtasks: data.workingOn.subtasks || [],
        };
      }

      if (!activeTask || !activeTask.subtasks || activeTask.subtasks.length === 0) {
        return html`<div class="empty">no active task</div>`;
      }

      let dc = 0;
      const subs = activeTask.subtasks.map(st => {
        const isDone = st.status === 'done' || st.status === 'complete';
        const isAct = st.status === 'in_progress' || st.status === 'active';
        if (isDone) dc++;
        const cls = isDone ? 'done' : (isAct ? 'act' : 'pen');
        return html`
          <div class="wc-st">
            ${isDone
              ? html`<span class="wc-si done">\u2713</span>`
              : isAct
                ? html`<span class="wc-si act"><span class="blink">\u258C</span></span>`
                : html`<span class="wc-si pen">\u00B7</span>`
            }
            <span class=${`wc-sn ${cls}`}>${st.name}</span>
          </div>
        `;
      });

      const wp = activeTask.subtasks.length > 0 ? Math.round(dc / activeTask.subtasks.length * 100) : 0;

      return html`
        <div class="wc">
          <div class="wc-nm">${activeTask.name || 'Current Task'}</div>
          ${subs}
          <div class="wc-bar"><div class="wc-bf" style=${{ width: wp + '%' }}></div></div>
        </div>
      `;
    }

    function ConcernsPanel({ data }) {
      const concerns = data.concerns;
      if (!concerns || !concerns.categories || concerns.categories.length === 0) return null;

      return html`
        <section>
          <div class="sh"><span class="c">//</span> concerns</div>
          ${concerns.categories.map((cat, i) => html`
            <div class="cn-row" key=${cat.name || i}>
              <span class="cn-nm">${cat.name}</span>
              <span class="cn-ct">(${cat.count})</span>
            </div>
          `)}
        </section>
      `;
    }

    function CodebaseFreshness({ data, showToast }) {
      const cf = data.codebaseFreshness;
      if (!cf || !cf.lastUpdated) return null;

      const days = daysBetween(cf.lastUpdated);
      const isStale = cf.isStale || days > 7;
      const label = days === 0 ? 'Updated today' : days === 1 ? 'Updated 1d ago' : `Updated ${days}d ago`;

      return html`
        <section>
          <div class="sh"><span class="c">//</span> codebase</div>
          <div class="cf">
            <span class=${isStale ? 'cf-stale' : ''}>${label}</span>
            ${isStale ? html`
              <button class="btn-action" aria-label="Update codebase map" onClick=${() => copyToClipboard('/map-codebase', showToast)}>[update]</button>
            ` : null}
          </div>
        </section>
      `;
    }

    function BacklogList({ data, showToast }) {
      // Support both data.todos.pending (current parser) and data.backlog (spec shape)
      const items = data.backlog || (data.todos?.pending) || [];
      const [expanded, setExpanded] = useState({});

      if (items.length === 0) {
        return html`
          <section>
            <div class="sh"><span class="c">//</span> backlog</div>
            <div class="empty">none \u2014 <span class="cmd">/fh:add-todo</span></div>
          </section>
        `;
      }

      const toggle = (i) => setExpanded(prev => ({ ...prev, [i]: !prev[i] }));

      return html`
        <section>
          <div class="sh"><span class="c">//</span> backlog <span>(${items.length})</span></div>
          ${items.map((t, i) => {
            const hasBody = t.body || t.area;
            return html`
              <div key=${i}>
                <div class="td"
                  onClick=${hasBody ? () => toggle(i) : undefined}
                  onKeyDown=${hasBody ? (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(i); } } : undefined}
                  role=${hasBody ? 'button' : undefined}
                  tabindex=${hasBody ? '0' : undefined}
                  aria-expanded=${hasBody ? String(!!expanded[i]) : undefined}
                >
                  <span class="td-i">\u25CB</span>
                  <span class="td-t">${t.title}</span>
                  ${t.area && !t.body ? html`<span class="td-a">${t.area}</span>` : null}
                  ${t.priority ? html`<span class="td-a">${t.priority}</span>` : null}
                </div>
                ${expanded[i] && (t.body || t.area) ? html`
                  <div class="td-body">${t.body || t.area}</div>
                ` : null}
              </div>
            `;
          })}
        </section>
      `;
    }

    function QuickTaskList({ data }) {
      const qts = data.quickTasks || [];
      const [expanded, setExpanded] = useState({});

      if (qts.length === 0) {
        return html`
          <section>
            <div class="sh"><span class="c">//</span> quick_tasks</div>
            <div class="empty">none \u2014 <span class="cmd">/fh:quick</span></div>
          </section>
        `;
      }

      const toggle = (i) => setExpanded(prev => ({ ...prev, [i]: !prev[i] }));

      return html`
        <section>
          <div class="sh"><span class="c">//</span> quick_tasks</div>
          ${qts.map((q, i) => {
            const qd = q.status === 'complete';
            const hasBody = !!q.body;
            return html`
              <div key=${i}>
                <div class="qt"
                  onClick=${hasBody ? () => toggle(i) : undefined}
                  onKeyDown=${hasBody ? (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(i); } } : undefined}
                  role=${hasBody ? 'button' : undefined}
                  tabindex=${hasBody ? '0' : undefined}
                  aria-expanded=${hasBody ? String(!!expanded[i]) : undefined}
                >
                  <span class=${`qt-i ${qd ? 'done' : 'pen'}`}>${qd ? '\u2713' : '\u00B7'}</span>
                  <span class="qt-num">#${q.number}</span>
                  <span class=${`qt-t ${qd ? 'done' : 'pen'}`}>${q.title}</span>
                </div>
                ${expanded[i] && q.body ? html`
                  <div class="qt-body">${q.body}</div>
                ` : null}
              </div>
            `;
          })}
        </section>
      `;
    }

    function ActivityList({ data }) {
      const updates = data.recentActivity || data.activity || [];

      if (updates.length === 0) {
        return html`
          <section>
            <div class="sh"><span class="c">//</span> activity</div>
            <div class="empty">no recent activity</div>
          </section>
        `;
      }

      return html`
        <section>
          <div class="sh"><span class="c">//</span> activity</div>
          ${updates.slice(0, 6).map((u, i) => html`
            <div class="ac" key=${i}>
              <span class="ac-t">${relativeTime(u.time || u.date)}</span>
              <span class="ac-x">${u.text}</span>
            </div>
          `)}
        </section>
      `;
    }

    // -----------------------------------------------------------------------
    // App
    // -----------------------------------------------------------------------
    function App() {
      const [data, setData] = useState(null);
      const [connected, setConnected] = useState(false);
      const [toast, showToast] = useToast();
      const esRef = useRef(null);
      const rtRef = useRef(null);
      const unmountedRef = useRef(false);

      const fetchState = useCallback(() => {
        fetch('/api/state')
          .then(r => r.json())
          .then(d => {
            if (unmountedRef.current) return;
            setData(d);
            document.title = ((d.project && d.project.name) || 'Project') + ' \u2014 tracker';
          })
          .catch(e => console.error(e));
      }, []);

      const connectSSE = useCallback(() => {
        if (unmountedRef.current) return;
        if (esRef.current) { esRef.current.close(); esRef.current = null; }
        const es = new EventSource('/api/events');
        esRef.current = es;
        es.onopen = () => {
          if (unmountedRef.current) { es.close(); return; }
          setConnected(true);
          if (rtRef.current) { clearTimeout(rtRef.current); rtRef.current = null; }
        };
        es.addEventListener('refresh', fetchState);
        es.onerror = () => {
          setConnected(false);
          es.close();
          esRef.current = null;
          if (!rtRef.current && !unmountedRef.current) {
            rtRef.current = setTimeout(() => { rtRef.current = null; connectSSE(); }, 2000);
          }
        };
      }, [fetchState]);

      useEffect(() => {
        unmountedRef.current = false;
        fetchState();
        connectSSE();
        return () => {
          unmountedRef.current = true;
          if (esRef.current) esRef.current.close();
          if (rtRef.current) clearTimeout(rtRef.current);
        };
      }, [fetchState, connectSSE]);

      if (!data) {
        return html`<div class="wrap"><span class="proj"><span class="gt">></span> loading...</span></div>`;
      }

      const milestones = groupByMilestone(data.stages || []);

      return html`
        <div class="wrap">
          <${Header} data=${data} connected=${connected} />
          <${Stats} data=${data} />
          <div class="grid">
            <div class="ms-list">
              ${milestones.map((ms, i) => html`<${MilestoneGroup} ms=${ms} showToast=${showToast} key=${ms.name + i} />`)}
            </div>
            <div class="side">
              <section>
                <div class="sh"><span class="c">//</span> working_on</div>
                <${WorkingOn} data=${data} />
              </section>
              <${ConcernsPanel} data=${data} />
              <${CodebaseFreshness} data=${data} showToast=${showToast} />
              <${BacklogList} data=${data} showToast=${showToast} />
              <${QuickTaskList} data=${data} />
              <${ActivityList} data=${data} />
            </div>
          </div>
          <div class=${`toast${toast ? ' show' : ''}`}>${toast}</div>
        </div>
      `;
    }

    preactRender(html`<${App} />`, document.getElementById('app'));
  </script>
</body>
</html>
